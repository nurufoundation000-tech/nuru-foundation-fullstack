<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
    <style>
        .profile-header { display: flex; align-items: center; gap: 30px; background: linear-gradient(135deg, var(--primary-color), var(--accent-color-1)); color: white; padding: 40px; border-radius: var(--border-radius-lg); margin-bottom: 30px; }
        .profile-avatar { width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; color: var(--primary-color); flex-shrink: 0; }
        .profile-info h1 { margin: 0 0 10px 0; font-size: 2rem; }
        .profile-info p { margin: 0; opacity: 0.9; }
    </style>
</head>
<body>
    <div id="headerContainer"></div>
    
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="profile"></dashboard-sidebar>
        
        <div class="dashboard-main">
            <div class="profile-header">
                <div class="profile-avatar" id="userAvatar">JD</div>
                <div class="profile-info">
                    <h1 id="userFullName">Loading...</h1>
                    <p id="userEmail">Loading...</p>
                </div>
            </div>
            
            <div class="profile-section">
                <h2><i class="fas fa-user"></i> Personal Information</h2>
                <div id="profileInfo" class="profile-info-grid">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                </div>
            </div>
        </div>
    </div>

    <div id="footerContainer"></div>

    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script>
        let currentUser = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            
            if (!DashboardUtils.checkAuth('student')) return;
            
            loadProfileData();
        });
        
        function getInitials(name) {
            return name ? name.split(' ').map(w => w.charAt(0)).join('').toUpperCase().substring(0, 2) : 'JD';
        }
        
        function loadProfileData() {
            const userData = sessionStorage.getItem('user');
            if (!userData) {
                window.location.href = '/login.html';
                return;
            }
            
            currentUser = JSON.parse(userData);
            
            document.getElementById('userFullName').textContent = currentUser.fullName || currentUser.username || 'Student';
            document.getElementById('userEmail').textContent = currentUser.email || '';
            document.getElementById('userAvatar').textContent = getInitials(currentUser.fullName || currentUser.username);
            
            loadUserDetails();
        }
        
        async function loadUserDetails() {
            const container = document.getElementById('profileInfo');
            
            try {
                const data = await DashboardUtils.fetchAPI('/users/me');
                
                if (data.success && data.user) {
                    displayProfileInfo(data.user);
                } else {
                    displayProfileInfo(currentUser);
                }
            } catch (error) {
                console.error('Error:', error);
                displayProfileInfo(currentUser);
            }
        }
        
        function displayProfileInfo(user) {
            const container = document.getElementById('profileInfo');
            
            container.innerHTML = `
                <div class="info-item">
                    <div class="label">Full Name</div>
                    <div class="value">${escapeHtml(user.fullName || user.username || 'N/A')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Email</div>
                    <div class="value">${escapeHtml(user.email || 'N/A')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Username</div>
                    <div class="value">${escapeHtml(user.username || 'N/A')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Role</div>
                    <div class="value">${escapeHtml(user.role?.name || user.role || 'Student')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Phone</div>
                    <div class="value">${escapeHtml(user.phone || 'Not provided')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Location</div>
                    <div class="value">${escapeHtml(user.location || 'Not provided')}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
