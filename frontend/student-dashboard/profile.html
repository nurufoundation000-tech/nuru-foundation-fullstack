<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            color: #333;
            min-height: 100vh;
        }

        .profile-container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color-1));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 600;
            margin: 0 auto 20px;
        }

        .profile-header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .profile-header p {
            color: #666;
            font-size: 1rem;
        }

        .profile-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 30px;
        }

        .profile-section h2 {
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .profile-section h2 i {
            color: var(--accent-color-1);
        }

        /* Profile Info */
        .profile-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .info-value {
            color: #333;
            font-size: 1.1rem;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        /* Form Styles */
        .profile-form {
            max-width: 500px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-hint {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 0.85rem;
        }

        .form-hint.error {
            color: #dc3545;
        }

        .form-hint.success {
            color: #28a745;
        }

        .password-strength {
            margin-top: 10px;
        }

        .strength-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            background: #dc3545;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .strength-text {
            font-size: 0.8rem;
            color: #666;
        }

        /* Button Styles */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .toast-success {
            background: #28a745;
        }

        .toast-error {
            background: #dc3545;
        }

        .toast-info {
            background: #17a2b8;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading i {
            margin-right: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Back Button */
        .back-button {
            margin-bottom: 30px;
        }

        .back-button .btn {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .back-button .btn:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-container {
                margin-top: 80px;
                padding: 0 15px;
            }

            .profile-section {
                padding: 20px;
            }

            .profile-info {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="headerContainer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Load header
            fetch('/header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('headerContainer').innerHTML = data;
                    
                    const authScript = document.createElement('script');
                    authScript.src = '/scripts/auth.js';
                    document.head.appendChild(authScript);

                    authScript.onload = () => {
                        const headerScript = document.createElement('script');
                        headerScript.src = '/scripts/header.js';
                        document.head.appendChild(headerScript);

                        headerScript.onload = () => {
                            if (typeof initHeader === 'function') {
                                initHeader();
                            }
                            // Load profile data after header is initialized
                            loadProfileData();
                        };
                    };
                })
                .catch(error => console.error('Error loading header:', error));
        });
    </script>

    <div class="profile-container">
        <!-- Back Button -->
        <div class="back-button">
            <button class="btn" onclick="window.location.href='/student-dashboard/index.html'">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </button>
        </div>

        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-avatar" id="userAvatar">JD</div>
            <h1 id="userFullName">Loading...</h1>
            <p id="userEmail">Loading...</p>
        </div>

        <!-- Personal Information Section -->
        <section class="profile-section">
            <h2><i class="fas fa-user"></i> Personal Information</h2>
            
            <div id="profileInfo" class="profile-info">
                <div class="loading">
                    <i class="fas fa-spinner"></i> Loading profile information...
                </div>
            </div>
        </section>

        <!-- Change Password Section -->
        <section class="profile-section">
            <h2><i class="fas fa-key"></i> Change Password</h2>
            
            <form id="changePasswordForm" class="profile-form">
                <div class="form-group">
                    <label for="currentPassword">Current Password</label>
                    <input type="password" id="currentPassword" class="form-control" required autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-control" required autocomplete="new-password" minlength="8">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="passwordStrengthBar"></div>
                        </div>
                        <div class="strength-text" id="passwordStrengthText">Password strength</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-control" required autocomplete="new-password" minlength="8">
                    <small class="form-hint" id="passwordMatchHint"></small>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-key"></i> Change Password
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="resetPasswordForm()">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
            </form>
        </section>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // const API_BASE_URL = window.location.hostname === 'localhost' 
        //     ? 'http://localhost:3000/api' 
        //     : 'https://nuru-foundation-fullstack.vercel.app/api';

        let currentUser = null;

        // Load profile data
        async function loadProfileData() {
            try {
                const token = localStorage.getItem('token');
                const userData = localStorage.getItem('user');
                
                if (!token || !userData) {
                    showToast('Please login to access profile', 'error');
                    setTimeout(() => window.location.href = '/login.html', 2000);
                    return;
                }

                currentUser = JSON.parse(userData);
                
                // Update header user info
                updateHeaderInfo();
                
                // Load detailed user info from API
                await loadUserDetails();
                
                // Setup event listeners
                setupEventListeners();
                
            } catch (error) {
                console.error('Error loading profile data:', error);
                showToast('Failed to load profile data', 'error');
            }
        }

        function updateHeaderInfo() {
            if (!currentUser) return;
            
            document.getElementById('userFullName').textContent = currentUser.fullName || currentUser.username;
            document.getElementById('userEmail').textContent = currentUser.email;
            
            // Set avatar initials
            const initials = getInitials(currentUser.fullName || currentUser.username);
            document.getElementById('userAvatar').textContent = initials;
        }

        function getInitials(name) {
            return name.split(' ')
                .map(word => word.charAt(0))
                .join('')
                .toUpperCase()
                .substring(0, 2);
        }

        async function loadUserDetails() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE_URL}/users/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.user) {
                        displayProfileInfo(data.user);
                    }
                } else {
                    // Fallback to localStorage data if API fails
                    displayProfileInfo(currentUser);
                }
            } catch (error) {
                console.error('Error loading user details:', error);
                // Fallback to localStorage data
                displayProfileInfo(currentUser);
            }
        }

        function displayProfileInfo(user) {
            const profileInfo = document.getElementById('profileInfo');
            
            profileInfo.innerHTML = `
                <div class="info-item">
                    <span class="info-label">Username</span>
                    <span class="info-value">${user.username || 'N/A'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Email</span>
                    <span class="info-value">${user.email || 'N/A'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Full Name</span>
                    <span class="info-value">${user.fullName || 'Not provided'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Role</span>
                    <span class="info-value">${user.role?.name || 'Student'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Account Status</span>
                    <span class="info-value">${user.isActive ? 'Active' : 'Inactive'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Member Since</span>
                    <span class="info-value">${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A'}</span>
                </div>
            `;
        }

        function setupEventListeners() {
            // Change password form
            document.getElementById('changePasswordForm').addEventListener('submit', changePassword);
            
            // Password strength checker
            document.getElementById('newPassword').addEventListener('input', checkPasswordStrength);
            document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);
        }

        async function changePassword(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            if (!currentPassword || !newPassword || !confirmPassword) {
                showToast('All password fields are required', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showToast('New passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 8) {
                showToast('Password must be at least 8 characters long', 'error');
                return;
            }

            try {
                const token = localStorage.getItem('token');
                
                // First, let's debug the token and request
                console.log('🔑 Token available:', !!token);
                console.log('📡 Making PUT request to:', `${API_BASE_URL}/users/change-password`);
                console.log('📝 Request body:', { 
                    currentPassword: currentPassword ? '***' : 'empty',
                    newPassword: newPassword ? '***' : 'empty' 
                });
                
                const response = await fetch(`${API_BASE_URL}/users/change-password`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        currentPassword,
                        newPassword
                    })
                });

                console.log('📥 Response status:', response.status, response.statusText);
                console.log('📥 Response headers:', Object.fromEntries(response.headers.entries()));
                
                // Get response text first to see what's returned
                const responseText = await response.text();
                console.log('📦 Raw response text:', responseText.substring(0, 200));
                
                let result;
                try {
                    result = JSON.parse(responseText);
                    console.log('✅ Parsed JSON response:', result);
                } catch (parseError) {
                    console.error('❌ Failed to parse response as JSON:', parseError);
                    throw new Error(`Server returned non-JSON: ${responseText.substring(0, 100)}`);
                }

                if (response.ok) {
                    // Your server returns { success: true, message: '...' } on success
                    if (result.success === true) {
                        showToast('Password changed successfully!', 'success');
                        resetPasswordForm();
                    } else {
                        // Server returned success status but error in body
                        throw new Error(result.error || result.message || 'Unknown error');
                    }
                } else {
                    // Server returned error status
                    throw new Error(result.error || result.message || `Server error: ${response.status}`);
                }

            } catch (error) {
                console.error('Error changing password:', error);
                showToast(`Error: ${error.message}`, 'error');
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthBar = document.getElementById('passwordStrengthBar');
            const strengthText = document.getElementById('passwordStrengthText');
            
            if (!password) {
                strengthBar.style.width = '0%';
                strengthBar.style.background = '#dc3545';
                strengthText.textContent = 'Password strength';
                return;
            }
            
            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;
            
            const width = (score / 5) * 100;
            strengthBar.style.width = width + '%';
            
            if (score <= 2) {
                strengthBar.style.background = '#dc3545';
                strengthText.textContent = 'Weak';
                strengthText.style.color = '#dc3545';
            } else if (score <= 4) {
                strengthBar.style.background = '#ffc107';
                strengthText.textContent = 'Medium';
                strengthText.style.color = '#ffc107';
            } else {
                strengthBar.style.background = '#28a745';
                strengthText.textContent = 'Strong';
                strengthText.style.color = '#28a745';
            }
        }

        function checkPasswordMatch() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const hint = document.getElementById('passwordMatchHint');
            
            if (!confirmPassword) {
                hint.textContent = '';
                hint.className = 'form-hint';
                return;
            }
            
            if (newPassword === confirmPassword) {
                hint.textContent = 'Passwords match ✓';
                hint.className = 'form-hint success';
            } else {
                hint.textContent = 'Passwords do not match ✗';
                hint.className = 'form-hint error';
            }
        }

        function resetPasswordForm() {
            document.getElementById('changePasswordForm').reset();
            resetPasswordStrength();
        }

        function resetPasswordStrength() {
            document.getElementById('passwordStrengthBar').style.width = '0%';
            document.getElementById('passwordStrengthText').textContent = 'Password strength';
            document.getElementById('passwordStrengthText').style.color = '#666';
            document.getElementById('passwordMatchHint').textContent = '';
        }

        // Toast notification function
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            
            toastContainer.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after 5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

            } catch (error) {
                console.error('Change password error:', error);
                res.status(500).json({ error: 'Failed to change password' });
            }
        });
        */
    </script>
</body>
</html>
