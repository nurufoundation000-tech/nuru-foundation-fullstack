<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
</head>
<body>
    <div id="headerContainer"></div>
    
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="my-courses"></dashboard-sidebar>
        
        <div class="dashboard-main">
            <page-header title="My Courses" subtitle="Manage your enrolled courses" icon="fa-book"></page-header>
            
            <div class="filter-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="Search courses...">
                <select class="filter-select" id="statusFilter">
                    <option value="all">All Status</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <select class="filter-select" id="sortBy">
                    <option value="enrolledAt">Recently Enrolled</option>
                    <option value="title">Alphabetical</option>
                    <option value="progress">Progress</option>
                </select>
            </div>
            
            <div id="coursesContainer" class="content-grid">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading courses...</p></div>
            </div>
        </div>
    </div>

    <div id="footerContainer"></div>
    
    <div id="unenrollModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeUnenrollModal()">&times;</button>
            <h2 style="color: var(--primary-color); margin-bottom: 15px;">Confirm Unenrollment</h2>
            <p>Are you sure you want to unenroll from this course? Your progress will be lost.</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-danger" onclick="confirmUnenroll()">Yes, Unenroll</button>
                <button class="btn btn-outline" onclick="closeUnenrollModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script src="/scripts/courseSlugs.js"></script>
    <script>
        let allCourses = [];
        let currentUnenrollId = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            
            if (!DashboardUtils.checkAuth('student')) return;
            
            document.getElementById('searchInput').addEventListener('input', filterCourses);
            document.getElementById('statusFilter').addEventListener('change', filterCourses);
            document.getElementById('sortBy').addEventListener('change', filterCourses);
            
            loadCourses();
        });
        
        async function loadCourses() {
            const container = document.getElementById('coursesContainer');
            
            try {
                const data = await DashboardUtils.fetchAPI('/student/courses/progress');
                
                if (!data.success) throw new Error(data.error || 'Failed to load');
                
                allCourses = data.data || [];
                filterCourses();
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${error.message}</div>`;
            }
        }
        
        function filterCourses() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const sort = document.getElementById('sortBy').value;
            
            let filtered = allCourses.filter(c => {
                const title = c.course.title.toLowerCase();
                return title.includes(search);
            });
            
            if (status !== 'all') {
                filtered = filtered.filter(c => {
                    const progress = c.progress || 0;
                    return status === 'completed' ? progress === 100 : progress > 0 && progress < 100;
                });
            }
            
            filtered.sort((a, b) => {
                if (sort === 'title') return a.course.title.localeCompare(b.course.title);
                if (sort === 'progress') return (b.progress || 0) - (a.progress || 0);
                return new Date(b.enrolledAt) - new Date(a.enrolledAt);
            });
            
            displayCourses(filtered);
        }
        
        function displayCourses(courses) {
            const container = document.getElementById('coursesContainer');
            
            if (!courses.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><h3>No courses found</h3><p>Enroll in courses to get started</p><a href="/courses.html" class="btn btn-primary">Browse Courses</a></div>';
                return;
            }
            
            container.innerHTML = courses.map(enrollment => {
                const c = enrollment.course;
                const progress = enrollment.progress || 0;
                const slug = window.getCourseSlug ? window.getCourseSlug(c.id) : null;
                const notesLink = slug ? `/notes/${slug}/lesson-1.html` : '#';
                
                return `
                    <div class="content-card">
                        <div class="card-header">
                            <h3>${escapeHtml(c.title)}</h3>
                            <span class="category">${escapeHtml(c.category || 'Course')}</span>
                        </div>
                        <div class="card-body">
                            <p class="card-description">${escapeHtml(c.description || 'No description')}</p>
                            <div class="course-card .card-stats">
                                <div class="stat"><div class="stat-value">${enrollment.totalLessons || 0}</div><div class="stat-label">Lessons</div></div>
                                <div class="stat"><div class="stat-value">${enrollment.completedLessons || 0}</div><div class="stat-label">Completed</div></div>
                                <div class="stat"><div class="stat-value">${progress}%</div><div class="stat-label">Progress</div></div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                            </div>
                            <div class="card-actions">
                                <a href="/student-dashboard/lesson-viewer.html?courseId=${c.id}" class="btn btn-primary btn-sm">Continue Learning</a>
                                <a href="${notesLink}" class="btn btn-outline btn-sm">View Notes</a>
                                <button class="btn btn-danger btn-sm" onclick="openUnenrollModal(${enrollment.id})">Unenroll</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function openUnenrollModal(id) {
            currentUnenrollId = id;
            document.getElementById('unenrollModal').classList.add('show');
        }
        
        function closeUnenrollModal() {
            currentUnenrollId = null;
            document.getElementById('unenrollModal').classList.remove('show');
        }
        
        async function confirmUnenroll() {
            if (!currentUnenrollId) return;
            
            try {
                await DashboardUtils.fetchAPI(`/student/courses/${currentUnenrollId}/unenroll`, { method: 'DELETE' });
                DashboardUtils.showSuccess('Successfully unenrolled');
                closeUnenrollModal();
                loadCourses();
            } catch (error) {
                DashboardUtils.showError(error.message);
            }
        }
    </script>
</body>
</html>
