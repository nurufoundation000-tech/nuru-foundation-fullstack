<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Nuru Foundation</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles/root.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/footer.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
        .register-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 20px 60px; }
        .register-card { background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 480px; }
        .register-card h1 { color: #27ae60; font-size: 1.8rem; margin-bottom: 8px; text-align: center; }
        .register-card .subtitle { color: #6c757d; text-align: center; margin-bottom: 30px; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #2c3e50; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 1rem; transition: border-color 0.3s ease; font-family: inherit; }
        .form-group input:focus { outline: none; border-color: #27ae60; }
        .btn-primary { width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: inherit; }
        .btn-primary:hover { background: #219a52; transform: translateY(-2px); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .error-message { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; display: none; }
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; display: none; }
        .login-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #6c757d; }
        .login-link a { color: #27ae60; text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }
        .password-hint { font-size: 0.8rem; color: #6c757d; margin-top: 4px; }
        @media (max-width: 480px) { .register-card { padding: 25px; } }
    </style>
</head>
<body>
    <div id="headerContainer"></div>
    <div class="register-container">
        <div class="register-card">
            <h1><i class="fas fa-user-plus"></i> Create Account</h1>
            <p class="subtitle">Join Nuru Foundation and start learning</p>
            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+254 7XX XXX XXX">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="Min. 6 characters">
                    <div class="password-hint">At least 6 characters</div>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fas fa-spinner fa-spin" id="spinner" style="display:none"></i>
                    <span id="btnText">Create Account</span>
                </button>
            </form>
            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
    <div id="footerContainer"></div>

    <script src="scripts/config.js"></script>
    <script>
        const API_BASE_URL = window.API_BASE_URL || '/api';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const resp = await fetch('/header.html');
                const html = await resp.text();
                document.getElementById('headerContainer').innerHTML = html;
            } catch(e) {}
            try {
                const resp = await fetch('/footer.html');
                const html = await resp.text();
                document.getElementById('footerContainer').innerHTML = html;
            } catch(e) {}
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const data = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value
            };

            submitBtn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = 'Creating Account...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    successMsg.style.display = 'block';
                    successMsg.innerHTML = '<i class="fas fa-check-circle"></i> Account created successfully! Redirecting...';
                    if (result.token) {
                        sessionStorage.setItem('token', result.token);
                        sessionStorage.setItem('user', JSON.stringify(result.user || result.data));
                    }
                    setTimeout(() => {
                        window.location.href = '/courses.html';
                    }, 1500);
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (result.error || 'Registration failed');
                }
            } catch (error) {
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Connection error. Please try again.';
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
