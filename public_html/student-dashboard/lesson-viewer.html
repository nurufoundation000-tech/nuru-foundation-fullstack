<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/scripts/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Viewer - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../styles/root.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        .lesson-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            gap: 30px;
        }

        .lesson-sidebar {
            width: 300px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .lesson-sidebar h3 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .lesson-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .lesson-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .lesson-item:hover {
            background: #f0f8ff;
        }

        .lesson-item.active {
            background: var(--primary-color);
            color: white;
            border-left-color: var(--accent-color-1);
        }

        .lesson-item.completed {
            border-left-color: var(--accent-color-2);
            background: #f0fff0;
        }

        .completed-icon {
            color: var(--accent-color-2);
            margin-left: auto;
        }

        .nav-btn.completed {
            background: var(--accent-color-2);
            cursor: default;
        }

        .lesson-main {
            flex: 1;
        }

        .lesson-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .lesson-header {
            margin-bottom: 30px;
        }

        .lesson-title {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .lesson-navigation {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--secondary-color);
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .lesson-video {
            width: 100%;
            max-width: 700px;
            height: 394px;
            border-radius: 12px;
            margin: 0 auto 30px;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .lesson-text {
            max-width: 720px;
            margin: 0 auto;
            font-size: 1.05rem;
            line-height: 1.9;
            color: #374151;
        }

        .lesson-text p {
            margin-bottom: 1.5em;
        }

        .lesson-text h1 {
            font-size: 2rem;
            margin: 2rem 0 1rem;
            color: #1f2937;
            font-weight: 700;
            line-height: 1.3;
        }

        .lesson-text h2 {
            font-size: 1.5rem;
            margin: 2rem 0 0.75rem;
            color: #1f2937;
            font-weight: 600;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .lesson-text h3 {
            font-size: 1.25rem;
            margin: 1.5rem 0 0.5rem;
            color: #374151;
            font-weight: 600;
        }

        .lesson-text img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 2rem auto;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .lesson-text img + em {
            display: block;
            text-align: center;
            font-size: 0.9rem;
            color: #6b7280;
            margin-top: -1.5rem;
            margin-bottom: 2rem;
        }

        .lesson-text blockquote {
            border-left: 4px solid var(--accent-color-1, #38b2ac);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            background: #f0fdf4;
            border-radius: 0 12px 12px 0;
            font-style: italic;
            font-size: 1.1rem;
            color: #374151;
        }

        .lesson-text pre {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            line-height: 1.6;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
        }

        .lesson-text code {
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            background: #f1f5f9;
            color: #e11d48;
            padding: 0.15em 0.4em;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .lesson-text pre code {
            background: none;
            color: inherit;
            padding: 0;
            border-radius: 0;
            font-size: inherit;
        }

        .lesson-text a {
            color: var(--primary-color, #6a0572);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .lesson-text a:hover {
            border-bottom-color: var(--primary-color, #6a0572);
        }

        .lesson-text ul, .lesson-text ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }

        .lesson-text li {
            margin-bottom: 0.5rem;
        }

        .lesson-text ul li::marker {
            color: var(--accent-color-1, #38b2ac);
        }

        .lesson-text table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            display: block;
            overflow-x: auto;
        }

        .lesson-text th {
            background: #f8fafc;
            font-weight: 600;
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .lesson-text td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .lesson-text tr:nth-child(even) {
            background: #fafafa;
        }

        .lesson-text hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color-1, #38b2ac), transparent);
            margin: 2.5rem 0;
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lesson-text {
            animation: fadeInContent 0.3s ease;
        }

        .lesson-meta {
            display: flex;
            gap: 15px;
            color: #6c757d;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .assignments-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .assignments-section h4 {
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .assignment-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .assignment-item h5 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        .assignment-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-submitted {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-graded {
            background: #d4edda;
            color: #155724;
        }

        .progress-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color-1));
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: var(--primary-color);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .lesson-container {
                flex-direction: column;
            }

            .lesson-sidebar {
                width: 100%;
                position: static;
            }

            .lesson-title {
                font-size: 1.5rem;
            }

            .lesson-video {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <script src="../scripts/header.js"></script>
    <div id="headerContainer"></div>

    <div class="lesson-container">
        <div class="lesson-sidebar">
            <h3>Course Lessons</h3>
            <ul class="lesson-list" id="lessonList">
                <!-- Lessons will be populated by JavaScript -->
            </ul>
        </div>

        <div class="lesson-main">
            <div class="lesson-content" id="lessonContent">
                <div class="lesson-header">
                    <div class="lesson-navigation">
                        <button class="nav-btn" id="prevBtn" disabled>Previous Lesson</button>
                        <button class="nav-btn" id="nextBtn" disabled>Next Lesson</button>
                    </div>
                    <h1 class="lesson-title" id="lessonTitle">Loading lesson...</h1>
                </div>

                <div id="lessonBody">
                    <!-- Lesson content will be populated by JavaScript -->
                </div>
            </div>

            <div id="liveSessionsSection" style="display:none; background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 30px;">
                <h3 style="color:var(--primary-color);margin:0 0 15px 0;"><i class="fas fa-video"></i> Upcoming Live Sessions</h3>
                <div id="liveSessionsList"></div>
                <a href="/student-dashboard/live-sessions.html" style="color:var(--primary-color);font-size:0.9rem;">View all sessions <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="progress-section">
                <h3>Course Progress</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0% Complete</div>
            </div>
        </div>
    </div>

    <script src="../scripts/footer.js"></script>
    <div id="footerContainer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Load header and footer
            fetch('../header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('headerContainer').innerHTML = data;
                    if (typeof initHeader === 'function') {
                        initHeader();
                    }
                });

            fetch('../footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footerContainer').innerHTML = data;
                });

            // Get course ID from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('courseId');
            const lessonId = urlParams.get('lessonId');

            if (!courseId) {
                alert('Course ID is required');
                window.location.href = '/courses.html';
                return;
            }

            let lessons = [];
            let currentLessonIndex = 0;

            try {
                // Load lessons script
                await loadScript('scripts/lessons.js');
                await loadScript('scripts/progress.js');

                // Fetch lessons for this course
                lessons = await fetchLessons(courseId);
                displayLessonList(lessons);

                // Load initial lesson
                if (lessonId) {
                    const lesson = lessons.find(l => l.id == lessonId);
                    if (lesson) {
                        currentLessonIndex = lessons.indexOf(lesson);
                    }
                }

                displayLesson(lessons[currentLessonIndex]);
                updateProgress();
                loadCourseSessions();
                loadForumSection();

            } catch (error) {
                console.error('Error loading lesson viewer:', error);
                document.getElementById('lessonContent').innerHTML = '<p>Error loading lesson. Please try again.</p>';
            }
        });

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        function displayLessonList(lessons) {
            const lessonList = document.getElementById('lessonList');
            lessonList.innerHTML = '';

            lessons.forEach((lesson, index) => {
                const li = document.createElement('li');
                li.className = `lesson-item ${lesson.isCompleted ? 'completed' : ''}`;
                li.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>${index + 1}. ${lesson.title}</span>
                        ${lesson.isCompleted ? '<i class="fas fa-check-circle completed-icon"></i>' : ''}
                    </div>
                `;
                li.onclick = () => {
                    currentLessonIndex = index;
                    displayLesson(lesson);
                    updateLessonList();
                };
                lessonList.appendChild(li);
            });

            updateLessonList();
        }

        function updateLessonList() {
            const items = document.querySelectorAll('.lesson-item');
            items.forEach((item, index) => {
                item.classList.remove('active');
                if (index === currentLessonIndex) {
                    item.classList.add('active');
                }
            });
        }

        function displayLesson(lesson) {
            document.getElementById('lessonTitle').textContent = lesson.title;

            // Reading time meta
            let metaDiv = document.querySelector('.lesson-meta');
            if (!metaDiv) {
                metaDiv = document.createElement('div');
                metaDiv.className = 'lesson-meta';
                document.getElementById('lessonTitle').after(metaDiv);
            }
            const wc = lesson.content ? lesson.content.replace(/<[^>]*>/g, '').split(/\s+/).filter(w => w.length).length : 0;
            const rt = Math.max(1, Math.ceil(wc / 200));
            metaDiv.innerHTML = `<span><i class="fas fa-book-open"></i> ~${rt} min read</span>`;

            const lessonBody = document.getElementById('lessonBody');
            lessonBody.innerHTML = '';

            // Video content
            if (lesson.videoUrl) {
                const videoContainer = document.createElement('div');
                videoContainer.innerHTML = `
                    <iframe class="lesson-video"
                            src="${lesson.videoUrl.replace('watch?v=', 'embed/')}"
                            frameborder="0"
                            allowfullscreen>
                    </iframe>
                `;
                lessonBody.appendChild(videoContainer);
            }

            // Text content
            if (lesson.content) {
                const textDiv = document.createElement('div');
                textDiv.className = 'lesson-text';
                textDiv.innerHTML = lesson.content;
                lessonBody.appendChild(textDiv);
            }

            // Complete lesson button
            const completeBtn = document.createElement('button');
            completeBtn.id = 'completeLessonBtn';
            completeBtn.className = 'nav-btn';
            completeBtn.textContent = lesson.isCompleted ? 'Completed' : 'Mark as Completed';
            completeBtn.disabled = lesson.isCompleted;
            if (lesson.isCompleted) {
                completeBtn.classList.add('completed');
            }
            completeBtn.onclick = async () => {
                try {
                    const result = await markLessonCompleted(lesson.id);

                    // Update UI
                    completeBtn.textContent = 'Completed';
                    completeBtn.disabled = true;
                    completeBtn.classList.add('completed');

                    // Update progress bar
                    updateProgressBar(result.courseProgress);

                    // Show success message
                    showNotification('Lesson marked as completed!', 'success');

                    // Reload lessons to update progress
                    const urlParams = new URLSearchParams(window.location.search);
                    const courseId = urlParams.get('courseId');
                    if (courseId) {
                        lessons = await fetchLessons(courseId);
                        displayLessonList(lessons);
                    }
                } catch (error) {
                    console.error('Error marking lesson as completed:', error);
                    showNotification('Failed to mark lesson as completed. Please try again.', 'error');
                }
            };
            lessonBody.appendChild(completeBtn);

            // Assignments section
            if (lesson.assignments && lesson.assignments.length > 0) {
                const assignmentsDiv = document.createElement('div');
                assignmentsDiv.className = 'assignments-section';
                assignmentsDiv.innerHTML = '<h4>Assignments</h4>';

                lesson.assignments.forEach(assignment => {
                    const assignmentDiv = document.createElement('div');
                    assignmentDiv.className = 'assignment-item';
                    assignmentDiv.innerHTML = `
                        <h5>${assignment.title}</h5>
                        <p>Max Score: ${assignment.maxScore}</p>
                        <a href="../assignment-submission.html?assignmentId=${assignment.id}" class="nav-btn">View Assignment</a>
                    `;
                    assignmentsDiv.appendChild(assignmentDiv);
                });

                lessonBody.appendChild(assignmentsDiv);
            }

            // Update navigation buttons
            updateNavigationButtons();
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            prevBtn.disabled = currentLessonIndex === 0;
            nextBtn.disabled = currentLessonIndex === lessons.length - 1;

            prevBtn.onclick = () => {
                if (currentLessonIndex > 0) {
                    currentLessonIndex--;
                    displayLesson(lessons[currentLessonIndex]);
                    updateLessonList();
                }
            };

            nextBtn.onclick = () => {
                if (currentLessonIndex < lessons.length - 1) {
                    currentLessonIndex++;
                    displayLesson(lessons[currentLessonIndex]);
                    updateLessonList();
                }
            };
        }

        async function updateProgress() {
            try {
                const progressData = await getUserProgress();
                const courseProgress = (progressData?.data || []).find(p => p.course?.id == courseId);

                if (courseProgress) {
                    const progressPercent = Math.min(100, Math.round(courseProgress.progress || 0));
                    document.getElementById('progressFill').style.width = `${progressPercent}%`;
                    document.getElementById('progressText').textContent = `${progressPercent}% Complete`;
                }
            } catch (error) {
                console.error('Error updating progress:', error);
            }
        }

        function updateProgressBar(progress) {
            const pct = typeof progress === 'number' && progress <= 1 ? Math.round(progress * 100) : Math.round(progress || 0);
            const progressPercent = Math.min(100, pct);
            document.getElementById('progressFill').style.width = `${progressPercent}%`;
            document.getElementById('progressText').textContent = `${progressPercent}% Complete`;
        }

        async function loadCourseSessions() {
            try {
                const token = sessionStorage.getItem('token');
                const res = await fetch(`${API_BASE}/sessions/course/${courseId}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) return;
                const data = await res.json();
                const sessions = (data.data || []).filter(s => s.session_date >= new Date().toISOString().split('T')[0]);
                if (sessions.length === 0) return;

                const section = document.getElementById('liveSessionsSection');
                const list = document.getElementById('liveSessionsList');
                section.style.display = 'block';

                list.innerHTML = sessions.slice(0, 3).map(s => {
                    const dateStr = new Date(s.session_date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    return `
                        <div style="background:#f8f9fa;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
                            <div>
                                <strong style="font-size:0.9rem;">${escapeHtml(s.title)}</strong>
                                <div style="font-size:0.8rem;color:#888;">${dateStr} &middot; ${s.duration_minutes} min</div>
                            </div>
                            <a href="${escapeHtml(s.meeting_link)}" target="_blank" class="btn btn-primary btn-sm" style="flex-shrink:0;"><i class="fas fa-video"></i> Join</a>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error('Error loading sessions:', e); }
        }

        async function loadForumSection() {
            const lessonBody = document.getElementById('lessonBody');
            const forumDiv = document.createElement('div');
            forumDiv.style.cssText = 'background:#f8f9fa;border-radius:10px;padding:20px;margin-top:20px;';
            forumDiv.innerHTML = `
                <h4 style="margin:0 0 10px 0;color:var(--primary-color);"><i class="fas fa-comments"></i> Discussion</h4>
                <p style="font-size:0.85rem;color:#666;margin-bottom:10px;">Have questions? Discuss this course with fellow students.</p>
                <a href="/student-dashboard/forum.html?courseId=${courseId}" class="btn btn-outline btn-sm"><i class="fas fa-comments"></i> Go to Forum</a>
            `;
            lessonBody.appendChild(forumDiv);
        }

        function showNotification(message, type) {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 8px;
                color: white;
                font-weight: 500;
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;

            if (type === 'success') {
                notification.style.backgroundColor = 'var(--accent-color-2)';
            } else {
                notification.style.backgroundColor = '#dc3545';
            }

            document.body.appendChild(notification);

            // Remove notification after 3 seconds
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }
    </script>
<script>function logout(){localStorage.clear();sessionStorage.clear();location.replace('/login.html')}</script>
</body>
</html>
