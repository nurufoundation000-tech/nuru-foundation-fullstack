<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
</head>
<body>
    <div id="headerContainer"></div>
    
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="progress"></dashboard-sidebar>
        
        <div class="dashboard-main">
            <page-header title="My Progress" subtitle="Track your learning journey" icon="fa-chart-line"></page-header>
            
            <stats-grid id="statsGrid" stats='[]'></stats-grid>
            
            <div class="filter-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="Search courses...">
                <select class="filter-select" id="sortBy">
                    <option value="progress">Progress</option>
                    <option value="title">Name</option>
                    <option value="enrolledAt">Date Enrolled</option>
                </select>
            </div>
            
            <div id="progressList"></div>
        </div>
    </div>

    <div id="footerContainer"></div>

    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script>
        let allProgressData = [];
        
        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            
            if (!DashboardUtils.checkAuth('student')) return;
            
            document.getElementById('searchInput').addEventListener('input', filterProgress);
            document.getElementById('sortBy').addEventListener('change', filterProgress);
            
            loadProgress();
        });
        
        async function loadProgress() {
            try {
                const data = await DashboardUtils.fetchAPI('/student/courses/progress');
                if (!data.success) throw new Error(data.error);
                
                allProgressData = data.data || [];
                updateStats();
                filterProgress();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('progressList').innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${error.message}</div>`;
            }
        }
        
        function updateStats() {
            const totalCourses = allProgressData.length;
            const completedCourses = allProgressData.filter(c => c.progress === 100).length;
            const totalLessons = allProgressData.reduce((sum, c) => sum + (c.totalLessons || 0), 0);
            const completedLessons = allProgressData.reduce((sum, c) => sum + (c.completedLessons || 0), 0);
            
            document.getElementById('statsGrid').setAttribute('stats', JSON.stringify([
                { value: totalCourses, label: 'Enrolled Courses' },
                { value: completedCourses, label: 'Completed' },
                { value: completedLessons, label: 'Lessons Done' },
                { value: totalLessons - completedLessons, label: 'Remaining' }
            ]));
        }
        
        function filterProgress() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortBy').value;
            
            let filtered = allProgressData.filter(c => c.course.title.toLowerCase().includes(search));
            
            filtered.sort((a, b) => {
                if (sort === 'title') return a.course.title.localeCompare(b.course.title);
                if (sort === 'progress') return (b.progress || 0) - (a.progress || 0);
                return new Date(b.enrolledAt) - new Date(a.enrolledAt);
            });
            
            displayProgress(filtered);
        }
        
        function displayProgress(courses) {
            const container = document.getElementById('progressList');
            
            if (!courses.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-chart-line"></i><h3>No progress data</h3><p>Start learning to see your progress</p></div>';
                return;
            }
            
            container.innerHTML = courses.map(enrollment => {
                const c = enrollment.course;
                const progress = enrollment.progress || 0;
                const completed = enrollment.completedLessons || 0;
                const total = enrollment.totalLessons || 0;
                
                return `
                    <div class="progress-course-item">
                        <div class="course-title">${escapeHtml(c.title)}</div>
                        <div class="course-meta">
                            <span><i class="fas fa-book"></i> ${total} lessons</span>
                            <span><i class="fas fa-check"></i> ${completed} completed</span>
                            <span><i class="fas fa-calendar"></i> Enrolled ${new Date(enrollment.enrolledAt).toLocaleDateString()}</span>
                        </div>
                        <div class="progress-percentage">
                            <div class="percentage">${progress}%</div>
                            <div class="progress-container" style="flex:1">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                            </div>
                            <a href="/student-dashboard/lesson-viewer.html?courseId=${c.id}" class="btn btn-primary btn-sm">Continue</a>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
