<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/scripts/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sessions - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
    <style>
        .sessions-container { padding: 20px 0; }
        .sessions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .session-card { background: white; border-radius: var(--border-radius-lg); overflow: hidden; box-shadow: var(--shadow-md); transition: transform 0.3s; border-top: 4px solid var(--primary-color); }
        .session-card:hover { transform: translateY(-3px); }
        .session-card-body { padding: 20px; }
        .session-card-body h3 { margin: 0 0 5px 0; color: var(--primary-color); font-size: 1.1rem; }
        .session-card-body .course-label { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .session-meta { display: flex; gap: 15px; flex-wrap: wrap; margin: 12px 0; font-size: 0.85rem; color: #555; }
        .session-meta span { display: flex; align-items: center; gap: 5px; }
        .countdown { background: #f0f8ff; padding: 8px 12px; border-radius: 8px; text-align: center; font-weight: 600; color: var(--primary-color); margin: 10px 0; }
        .countdown.ongoing { background: #d4edda; color: #155724; }
        .countdown.past { background: #f8d7da; color: #721c24; }
        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: var(--border-radius-lg); }
        .empty-state i { font-size: 3rem; color: #ccc; margin-bottom: 15px; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: 2px solid #e0e0e0; background: white; cursor: pointer; font-weight: 500; transition: all 0.3s; }
        .tab-btn.active { border-color: var(--primary-color); background: var(--primary-color); color: white; }
    </style>
</head>
<body>
    <div id="headerContainer"></div>
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="live-sessions"></dashboard-sidebar>
        <div class="dashboard-main">
            <page-header title="Live Sessions" subtitle="Upcoming and past live class sessions" icon="fa-video"></page-header>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('upcoming')">Upcoming</button>
                <button class="tab-btn" onclick="switchTab('past')">Past</button>
            </div>
            <div id="sessionsList"><div class="loading"><i class="fas fa-spinner fa-spin"></i></div></div>
        </div>
    </div>
    <div id="footerContainer"></div>
    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script>
        let allSessions = [];
        let currentTab = 'upcoming';

        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            if (!DashboardUtils.checkAuth('student')) return;
            await loadSessions();
        });

        async function loadSessions() {
            try {
                const data = await DashboardUtils.fetchAPI('/sessions/upcoming');
                allSessions = data.data || [];
                renderSessions();
            } catch (error) {
                console.error('Error loading sessions:', error);
                document.getElementById('sessionsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load sessions</p></div>';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick*="${tab}"]`).classList.add('active');
            renderSessions();
        }

        function renderSessions() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().split(' ')[0];

            const filtered = allSessions.filter(s => {
                if (currentTab === 'upcoming') {
                    return s.session_date > todayStr || (s.session_date === todayStr && s.session_time >= timeStr);
                }
                return s.session_date < todayStr || (s.session_date === todayStr && s.session_time < timeStr);
            });

            const container = document.getElementById('sessionsList');

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-video"></i><h3>No ${currentTab} sessions</h3><p>${currentTab === 'upcoming' ? 'Check back later for scheduled live sessions' : 'No past sessions found'}</p></div>`;
                return;
            }

            container.innerHTML = `<div class="sessions-grid">${filtered.map(s => {
                const sessionDate = new Date(s.session_date + 'T' + s.session_time);
                const diffMs = sessionDate - now;
                const isOngoing = diffMs <= 0 && diffMs > -(s.duration_minutes * 60 * 1000);
                const isPast = diffMs <= -(s.duration_minutes * 60 * 1000);
                const hoursLeft = Math.floor(diffMs / (1000 * 60 * 60));
                const minsLeft = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));

                let countdownHtml;
                if (isOngoing) {
                    countdownHtml = '<div class="countdown ongoing"><i class="fas fa-circle" style="color:#155724;font-size:0.6rem;vertical-align:middle;"></i> Ongoing Now</div>';
                } else if (isPast) {
                    countdownHtml = '<div class="countdown past"><i class="fas fa-check-circle"></i> Ended</div>';
                } else if (hoursLeft > 0) {
                    countdownHtml = `<div class="countdown"><i class="far fa-clock"></i> Starts in ${hoursLeft}h ${minsLeft}m</div>`;
                } else {
                    countdownHtml = `<div class="countdown"><i class="far fa-clock"></i> Starts in ${minsLeft}m</div>`;
                }

                const dateStr = new Date(s.session_date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

                return `
                    <div class="session-card">
                        <div class="session-card-body">
                            <h3>${escapeHtml(s.title)}</h3>
                            <div class="course-label"><i class="fas fa-book"></i> ${escapeHtml(s.course_title || '')}</div>
                            <div class="session-meta">
                                <span><i class="fas fa-calendar"></i> ${dateStr}</span>
                                <span><i class="fas fa-clock"></i> ${s.session_time.slice(0, 5)}</span>
                                <span><i class="fas fa-hourglass-half"></i> ${s.duration_minutes} min</span>
                            </div>
                            ${s.description ? `<p style="font-size:0.85rem;color:#666;margin:8px 0;">${escapeHtml(s.description)}</p>` : ''}
                            ${countdownHtml}
                            ${!isPast ? `<a href="${escapeHtml(s.meeting_link)}" target="_blank" rel="noopener" class="btn btn-primary btn-sm btn-block" style="margin-top: 10px;"><i class="fas fa-video"></i> Join Session</a>` : ''}
                        </div>
                    </div>
                `;
            }).join('')}</div>`;
        }
    </script>
<script>function logout(){localStorage.clear();sessionStorage.clear();location.replace('/login.html')}</script>
</body>
</html>
