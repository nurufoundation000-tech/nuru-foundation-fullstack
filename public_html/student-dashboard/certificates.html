<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/scripts/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Certificates - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
</head>
<body>
    <div id="headerContainer"></div>
    
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="certificates"></dashboard-sidebar>
        
        <div class="dashboard-main">
            <page-header title="My Certificates" subtitle="Your earned certificates and achievements" icon="fa-certificate"></page-header>
            
            <div class="certificates-placeholder" style="text-align:center;padding:80px 20px;">
                <i class="fas fa-certificate" style="font-size:5rem;color:#27ae60;opacity:0.3;margin-bottom:20px;"></i>
                <h2 style="color:#2c3e50;margin-bottom:10px;">Certificates — Coming Soon</h2>
                <p style="color:#6c757d;max-width:500px;margin:0 auto;line-height:1.6;">
                    Blockchain-verified certificates are on the way. Once you complete a course, 
                    your certificate will appear here and can be verified on the blockchain.
                </p>
                <div style="margin-top:30px;display:flex;gap:15px;justify-content:center;flex-wrap:wrap;">
                    <span style="background:#f0fdf4;color:#27ae60;padding:8px 16px;border-radius:20px;font-size:0.85rem;">
                        <i class="fas fa-check-circle"></i> Secure Verification
                    </span>
                    <span style="background:#f0fdf4;color:#27ae60;padding:8px 16px;border-radius:20px;font-size:0.85rem;">
                        <i class="fas fa-share-alt"></i> Shareable
                    </span>
                    <span style="background:#f0fdf4;color:#27ae60;padding:8px 16px;border-radius:20px;font-size:0.85rem;">
                        <i class="fas fa-link"></i> LinkedIn Ready
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div id="footerContainer"></div>

    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            if (!DashboardUtils.checkAuth('student')) return;
        });
    </script>
<script>function logout(){localStorage.clear();sessionStorage.clear();location.replace('/login.html')}</script>
</body>
</html>
