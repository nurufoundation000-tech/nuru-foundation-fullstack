<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
    <style>
        body { background: #f8f9fa; }
        .dashboard-header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, var(--primary-color), var(--accent-color-1)); color: white; border-radius: var(--border-radius-lg); margin-bottom: 30px; }
        .dashboard-header h1 { margin: 0 0 10px 0; font-size: 2rem; }
        .dashboard-header p { margin: 0; opacity: 0.9; }
        .user-info { background: white; padding: 25px; border-radius: var(--border-radius-lg); margin-bottom: 25px; box-shadow: var(--shadow-md); }
        .user-info h2 { color: var(--primary-color); margin: 0 0 15px 0; font-size: 1.3rem; }
        .user-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .user-detail-item { padding: 15px; background: #f8f9fa; border-radius: var(--border-radius-md); }
        .user-detail-item .label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .user-detail-item .value { font-weight: 600; color: #333; }
        .enrolled-courses { margin-bottom: 25px; }
        .enrolled-courses h2 { color: var(--primary-color); font-size: 1.3rem; margin-bottom: 15px; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .course-mini-card { background: white; border-radius: var(--border-radius-lg); overflow: hidden; box-shadow: var(--shadow-md); transition: transform 0.3s; }
        .course-mini-card:hover { transform: translateY(-3px); }
        .course-mini-card-header { background: linear-gradient(135deg, var(--primary-color), var(--accent-color-1)); color: white; padding: 15px; }
        .course-mini-card-header h3 { margin: 0; font-size: 1rem; }
        .course-mini-card-body { padding: 15px; }
        .course-mini-card-body .progress-container { margin: 10px 0; }
        .quick-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .quick-link-card { background: white; padding: 20px; border-radius: var(--border-radius-lg); text-align: center; box-shadow: var(--shadow-md); transition: transform 0.3s; cursor: pointer; }
        .quick-link-card:hover { transform: translateY(-3px); }
        .quick-link-card i { font-size: 2rem; color: var(--primary-color); margin-bottom: 10px; }
        .quick-link-card h4 { margin: 0 0 5px 0; color: #333; }
        .quick-link-card p { margin: 0; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div id="headerContainer"></div>
    
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="/student-dashboard/"></dashboard-sidebar>
        
        <div class="dashboard-main">
            <div class="dashboard-header">
                <h1>Welcome to Your Dashboard</h1>
                <p>Track your progress and access your learning resources</p>
            </div>
            
            <div class="user-info">
                <h2><i class="fas fa-user"></i> Your Profile</h2>
                <div class="user-details" id="userDetails">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                </div>
            </div>
            
            <div class="enrolled-courses">
                <h2><i class="fas fa-book"></i> My Enrolled Courses</h2>
                <div id="coursesList" class="courses-grid">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                </div>
            </div>
            
            <h2 style="color: var(--primary-color); margin-bottom: 15px;"><i class="fas fa-bolt"></i> Quick Links</h2>
            <div class="quick-links">
                <a href="/courses.html" class="quick-link-card">
                    <i class="fas fa-search"></i>
                    <h4>Browse Courses</h4>
                    <p>Find new courses</p>
                </a>
                <a href="/student-dashboard/progress.html" class="quick-link-card">
                    <i class="fas fa-chart-line"></i>
                    <h4>View Progress</h4>
                    <p>Track achievements</p>
                </a>
                <a href="/student-dashboard/notes.html" class="quick-link-card">
                    <i class="fas fa-sticky-note"></i>
                    <h4>My Notes</h4>
                    <p>Study materials</p>
                </a>
                <a href="/community.html" class="quick-link-card">
                    <i class="fas fa-users"></i>
                    <h4>Community</h4>
                    <p>Connect & learn</p>
                </a>
            </div>
        </div>
    </div>

    <div id="footerContainer"></div>

    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script src="/scripts/courseSlugs.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            
            if (!DashboardUtils.checkAuth('student')) return;
            
            loadUserData();
            loadEnrolledCourses();
        });
        
        function loadUserData() {
            const user = JSON.parse(sessionStorage.getItem('user') || '{}');
            const container = document.getElementById('userDetails');
            
            container.innerHTML = `
                <div class="user-detail-item">
                    <div class="label">Name</div>
                    <div class="value">${escapeHtml(user.fullName || user.username || 'N/A')}</div>
                </div>
                <div class="user-detail-item">
                    <div class="label">Email</div>
                    <div class="value">${escapeHtml(user.email || 'N/A')}</div>
                </div>
                <div class="user-detail-item">
                    <div class="label">Role</div>
                    <div class="value">${escapeHtml(user.role?.name || user.role || 'Student')}</div>
                </div>
            `;
        }
        
        async function loadEnrolledCourses() {
            const container = document.getElementById('coursesList');
            
            try {
                const data = await DashboardUtils.fetchAPI('/student/courses/progress');
                
                if (!data.success || !data.data || data.data.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><h3>No courses yet</h3><p>Enroll in courses to get started</p><a href="/courses.html" class="btn btn-primary">Browse Courses</a></div>';
                    return;
                }
                
                const courses = data.data.slice(0, 6);
                container.innerHTML = courses.map(enrollment => {
                    const course = enrollment.course;
                    const slug = window.getCourseSlug ? window.getCourseSlug(course.id) : null;
                    const progress = enrollment.progress || 0;
                    
                    return `
                        <div class="course-mini-card">
                            <div class="course-mini-card-header">
                                <h3>${escapeHtml(course.title)}</h3>
                            </div>
                            <div class="course-mini-card-body">
                                <div class="progress-container">
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${progress}%"></div>
                                    </div>
                                    <div class="progress-text">${progress}% Complete</div>
                                </div>
                                <a href="/student-dashboard/my-courses.html" class="btn btn-primary btn-sm btn-block">View Course</a>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading courses:', error);
                container.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Failed to load courses</div>';
            }
        }
    </script>
</body>
</html>
