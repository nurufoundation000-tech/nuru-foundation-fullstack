<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/scripts/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
    <style>
        .notif-list { margin-top: 20px; }
        .notif-item { background: white; border-radius: var(--border-radius-md); padding: 16px 20px; margin-bottom: 10px; box-shadow: var(--shadow-sm); display: flex; gap: 15px; align-items: flex-start; cursor: pointer; transition: background 0.3s; }
        .notif-item:hover { background: #f8f9fa; }
        .notif-item.unread { border-left: 4px solid var(--primary-color); background: #f0f8ff; }
        .notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .notif-icon.info { background: #d1ecf1; color: #0c5460; }
        .notif-icon.success { background: #d4edda; color: #155724; }
        .notif-icon.warning { background: #fff3cd; color: #856404; }
        .notif-icon.error { background: #f8d7da; color: #721c24; }
        .notif-body { flex: 1; }
        .notif-body h4 { margin: 0 0 4px 0; font-size: 0.95rem; }
        .notif-body p { margin: 0; font-size: 0.85rem; color: #666; }
        .notif-time { font-size: 0.75rem; color: #999; margin-top: 4px; }
        .mark-all-btn { float: right; }
        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state i { font-size: 4rem; color: #ddd; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="headerContainer"></div>
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="notifications"></dashboard-sidebar>
        <div class="dashboard-main">
            <page-header title="Notifications" subtitle="Stay updated with your learning journey" icon="fa-bell">
                <button class="btn btn-sm btn-outline" onclick="markAllRead()" id="markAllBtn" style="display:none;"><i class="fas fa-check-double"></i> Mark All Read</button>
            </page-header>
            <div id="notifList"><div class="loading"><i class="fas fa-spinner fa-spin"></i></div></div>
        </div>
    </div>
    <div id="footerContainer"></div>
    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            if (!DashboardUtils.checkAuth('student')) return;
            loadNotifications();
        });

        async function loadNotifications() {
            try {
                const data = await DashboardUtils.fetchAPI('/notifications');
                const notifs = data.data || [];
                const container = document.getElementById('notifList');

                if (notifs.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="far fa-bell"></i><h3>No notifications</h3><p>You\'ll see updates here when something new happens</p></div>';
                    return;
                }

                if (data.unreadCount > 0) {
                    document.getElementById('markAllBtn').style.display = 'inline-block';
                }

                container.innerHTML = '<div class="notif-list">' + notifs.map(n => `
                    <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="${n.link ? `window.location.href='${n.link}'` : 'markRead(' + n.id + ', this)'}">
                        <div class="notif-icon ${n.type}">
                            <i class="fas ${n.type === 'success' ? 'fa-check-circle' : n.type === 'error' ? 'fa-exclamation-circle' : n.type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i>
                        </div>
                        <div class="notif-body">
                            <h4>${escapeHtml(n.title)}</h4>
                            <p>${escapeHtml(n.body)}</p>
                            <div class="notif-time">${new Date(n.created_at).toLocaleDateString()} ${new Date(n.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                        ${!n.is_read ? '<i class="fas fa-circle" style="color:var(--primary-color);font-size:0.6rem;margin-top:8px;"></i>' : ''}
                    </div>
                `).join('') + '</div>';
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('notifList').innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Failed to load notifications</div>';
            }
        }

        async function markRead(id, el) {
            try {
                await DashboardUtils.fetchAPI(`/notifications/${id}/read`, { method: 'PUT' });
                el.classList.remove('unread');
                el.querySelector('.fa-circle')?.remove();
            } catch (e) { console.error(e); }
        }

        async function markAllRead() {
            try {
                await DashboardUtils.fetchAPI('/notifications/read-all', { method: 'PUT' });
                document.querySelectorAll('.notif-item').forEach(el => { el.classList.remove('unread'); el.querySelector('.fa-circle')?.remove(); });
                document.getElementById('markAllBtn').style.display = 'none';
            } catch (e) { console.error(e); }
        }
    </script>
<script>function logout(){localStorage.clear();sessionStorage.clear();location.replace('/login.html')}</script>
</body>
</html>
