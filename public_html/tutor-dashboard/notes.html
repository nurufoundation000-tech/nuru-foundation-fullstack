<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/scripts/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Notes - Tutor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../styles/root.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #333; }
        .tutor-container { display: flex; min-height: 100vh; }
        .tutor-sidebar { width: 260px; background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .tutor-brand { padding: 0 20px 20px; border-bottom: 1px solid #4a8b5c; margin-bottom: 20px; }
        .tutor-brand h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
        .tutor-brand p { font-size: 0.9rem; opacity: 0.8; }
        .tutor-nav { list-style: none; padding: 0 10px; }
        .tutor-nav li { margin-bottom: 5px; }
        .tutor-nav a { display: flex; align-items: center; padding: 12px 15px; color: #ecf0f1; text-decoration: none; border-radius: 8px; transition: all 0.3s ease; }
        .tutor-nav a:hover, .tutor-nav a.active { background: rgba(255,255,255,0.1); color: white; }
        .tutor-nav i { width: 20px; margin-right: 10px; font-size: 1.1rem; }
        .tutor-main { flex: 1; margin-left: 260px; padding: 20px; }
        .tutor-header { background: white; padding: 25px 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .tutor-header h1 { color: #27ae60; font-size: 2rem; margin-bottom: 0; }
        .header-actions { display: flex; gap: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .filters-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .filters-row { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 12px 45px 12px 15px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s ease; }
        .search-box input:focus { outline: none; border-color: var(--primary-color); }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #6c757d; }
        .filter-select { padding: 12px 15px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; min-width: 150px; }
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .note-card { background: #fff; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .note-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.12); }
        .note-title { font-size: 1.2rem; font-weight: 600; color: #2c3e50; margin-bottom: 10px; }
        .note-content { color: #7f8c8d; margin-bottom: 15px; flex-grow: 1; white-space: pre-wrap; }
        .note-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #95a5a6; border-top: 1px solid #ecf0f1; padding-top: 10px; margin-top: 10px; }
        .note-course { font-weight: 500; }
        .note-actions { display: flex; gap: 8px; }
        .action-btn { background: transparent; border: none; cursor: pointer; font-size: 1rem; color: #7f8c8d; transition: color 0.3s ease; }
        .action-btn:hover { color: var(--primary-color); }
        .btn-delete:hover { color: #e74c3c; }

        /* Editor view */
        .editor-view { display: none; }
        .editor-view.active { display: block; }
        .list-view { display: block; }
        .list-view.hidden { display: none; }

        .editor-header { background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .editor-header h2 { color: #2c3e50; font-size: 1.5rem; }
        .editor-header-actions { display: flex; gap: 10px; }

        .editor-panel { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 30px; margin-bottom: 20px; }

        .editor-title-input { width: 100%; font-size: 1.8rem; font-weight: 700; padding: 15px 0; border: none; border-bottom: 2px solid #e9ecef; margin-bottom: 20px; outline: none; transition: border-color 0.3s ease; font-family: 'Poppins', sans-serif; }
        .editor-title-input:focus { border-bottom-color: var(--primary-color); }

        #quillEditor { height: 500px; margin-bottom: 20px; }

        .editor-meta-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .editor-meta-row .form-group { flex: 1; min-width: 200px; }
        .editor-meta-row label { display: block; margin-bottom: 5px; font-weight: 500; color: #2c3e50; }
        .editor-meta-row select, .editor-meta-row input { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; }
        .editor-meta-row select:focus, .editor-meta-row input:focus { outline: none; border-color: var(--primary-color); }

        .editor-actions { display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e9ecef; }

        /* Preview Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 800px; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #6c757d; }
        .modal h2 { color: #2c3e50; margin-bottom: 20px; }
        .preview-content { padding: 20px; line-height: 1.8; max-height: 70vh; overflow-y: auto; }
        .preview-content img { max-width: 100%; }
        .preview-content iframe { max-width: 100%; border-radius: 8px; }
        .preview-content blockquote { border-left: 4px solid #27ae60; padding-left: 20px; color: #555; }
        .preview-content pre { background: #f8f9fa; padding: 15px; border-radius: 8px; overflow-x: auto; }
        .preview-content code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #2c3e50; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; }

        .loading, .empty-state { text-align: center; padding: 60px 20px; color: #7f8c8d; }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }

        @media (max-width: 768px) {
            .tutor-container { flex-direction: column; }
            .tutor-sidebar { width: 100%; height: auto; position: relative; }
            .tutor-main { margin-left: 0; }
            .tutor-header { flex-direction: column; gap: 15px; text-align: center; }
            .filters-row { flex-direction: column; align-items: stretch; }
            .notes-grid { grid-template-columns: 1fr; }
            .editor-title-input { font-size: 1.3rem; }
            .editor-meta-row { flex-direction: column; }
            #quillEditor { height: 350px; }
        }
    </style>
</head>
<body>
    <div class="tutor-container">
        <!-- Sidebar -->
        <nav class="tutor-sidebar">
            <div class="tutor-brand">
                <h1>NURU Tutor</h1>
                <p>Teaching Dashboard</p>
            </div>
            <ul class="tutor-nav">
                <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="courses.html"><i class="fas fa-book"></i> My Courses</a></li>
                <li><a href="lessons.html"><i class="fas fa-chalkboard-teacher"></i> Lessons</a></li>
                <li><a href="assignments.html"><i class="fas fa-tasks"></i> Assignments</a></li>
                <li><a href="submissions.html"><i class="fas fa-file-alt"></i> Submissions</a></li>
                <li><a href="enrollments.html"><i class="fas fa-clipboard-list"></i> Enrollments</a></li>
                <li><a href="notes.html" class="active"><i class="fas fa-sticky-note"></i> Course Notes</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="tutor-main">
            <!-- List View -->
            <div id="listView" class="list-view">
                <div class="tutor-header">
                    <h1>Course Notes</h1>
                    <div class="header-actions">
                        <button class="btn btn-secondary" onclick="refreshNotes()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                        <button class="btn btn-primary" onclick="openEditor('create')">
                            <i class="fas fa-plus"></i> Add Note
                        </button>
                    </div>
                </div>

                <div class="filters-section">
                    <div class="filters-row">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search notes..." onkeyup="filterNotes()">
                            <i class="fas fa-search"></i>
                        </div>
                        <select class="filter-select" id="courseFilter" onchange="filterNotes()">
                            <option value="">All Courses</option>
                        </select>
                    </div>
                </div>

                <div id="notesContainer">
                    <div class="loading">Loading notes...</div>
                </div>

                <div class="pagination" id="paginationContainer" style="display: none;">
                    <button class="pagination-btn" id="prevBtn" onclick="changePage(currentPage - 1)">
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <span class="pagination-info" id="paginationInfo"></span>
                    <button class="pagination-btn" id="nextBtn" onclick="changePage(currentPage + 1)">
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <!-- Editor View (full page) -->
            <div id="editorView" class="editor-view">
                <div class="editor-header">
                    <h2 id="editorTitle">Create New Note</h2>
                    <div class="editor-header-actions">
                        <button class="btn btn-secondary" onclick="backToList()">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                    </div>
                </div>

                <div class="editor-panel">
                    <div class="editor-meta-row">
                        <div class="form-group">
                            <label for="noteCourse">Course *</label>
                            <select id="noteCourse" required></select>
                        </div>
                        <div class="form-group">
                            <label for="noteReferenceUrl">Reference URL (YouTube, Zoom, article, etc.)</label>
                            <input type="url" id="noteReferenceUrl" placeholder="https://youtube.com/watch?v=...">
                        </div>
                    </div>

                    <input type="text" id="noteTitle" class="editor-title-input" placeholder="Note title..." required>

                    <div id="quillEditor"></div>

                    <div class="editor-actions">
                        <button type="button" class="btn btn-info" onclick="previewNote()">
                            <i class="fas fa-eye"></i> Preview
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="backToList()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                        <button type="button" class="btn btn-success" onclick="saveNote()">
                            <i class="fas fa-save"></i> Save Note
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal preview-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closePreview()">&times;</span>
            <h2>Note Preview</h2>
            <div class="preview-content" id="previewContent"></div>
        </div>
    </div>

    <script>
    const API_BASE_URL = '/api';

    let currentPage = 1;
    let totalPages = 1;
    let allNotes = [];
    let courses = [];
    let quill = null;
    let editingNoteId = null;

    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => checkTutorAccess(), 100);
    });

    function initQuill() {
        if (quill) return;
        quill = new Quill('#quillEditor', {
            theme: 'snow',
            placeholder: 'Write your note content here... Make it engaging with formatting, images, and more...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        quill.getModule('toolbar').addHandler('image', function() {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async function() {
                const file = input.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const token = sessionStorage.getItem('token');
                    const response = await fetch(`${API_BASE_URL}/upload/image`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const range = quill.getSelection(true);
                        quill.insertEmbed(range.index, 'image', data.url);
                    } else {
                        alert('Failed to upload image');
                    }
                } catch (error) {
                    console.error('Image upload error:', error);
                    alert('Failed to upload image');
                }
            };
        });
    }

    function checkTutorAccess() {
        const token = sessionStorage.getItem('token');
        const userData = sessionStorage.getItem('user');
        if (!token || !userData) {
            window.location.href = '/login.html';
            return;
        }
        try {
            const user = JSON.parse(userData);
            if ((user.role?.name || user.role) !== 'tutor') {
                window.location.href = '/dashboard.html';
                return;
            }
            loadInitialData();
        } catch (error) {
            console.error('Error parsing user data:', error);
            window.location.href = '/login.html';
        }
    }

    async function loadInitialData() {
        await loadCourses();
        await loadNotes();
    }

    async function loadCourses() {
        try {
            const token = sessionStorage.getItem('token');
            const response = await fetch(`${API_BASE_URL}/tutor/courses?limit=1000`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                courses = data.data || [];
                populateCourseFilter('courseFilter');
                populateCourseFilter('noteCourse', 'Select a Course');
            }
        } catch (error) {
            console.error('Error loading courses:', error);
        }
    }

    function populateCourseFilter(elementId, defaultOptionText = 'All Courses') {
        const select = document.getElementById(elementId);
        select.innerHTML = `<option value="">${defaultOptionText}</option>`;
        courses.forEach(course => {
            const option = document.createElement('option');
            option.value = course.id;
            option.textContent = course.title;
            select.appendChild(option);
        });
    }

    async function loadNotes(page = 1) {
        const container = document.getElementById('notesContainer');
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading notes...</div>';
        
        try {
            const token = sessionStorage.getItem('token');
            const searchTerm = document.getElementById('searchInput').value;
            const courseFilter = document.getElementById('courseFilter').value;

            let url = `${API_BASE_URL}/tutor/notes?page=${page}&limit=12`;
            if (courseFilter) url += `&courseId=${courseFilter}`;
            if (searchTerm) url += `&search=${encodeURIComponent(searchTerm)}`;

            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const data = await response.json();
                
                if (data.success) {
                    allNotes = data.data || [];
                    currentPage = data.pagination?.page || 1;
                    totalPages = data.pagination?.pages || 1;
                    filterNotes();
                    updatePagination(data.pagination);
                } else {
                    throw new Error(data.error || 'Failed to load notes');
                }
            } else {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `HTTP ${response.status}: Failed to load notes`);
            }
        } catch (error) {
            console.error('Error loading notes:', error);
            container.innerHTML = `
                <div class="error" style="text-align: center; padding: 40px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                    <h3>Failed to load notes</h3>
                    <p>${error.message}</p>
                    <button class="btn btn-primary" onclick="loadNotes(1)" style="margin-top: 15px;">
                        <i class="fas fa-redo"></i> Try Again
                    </button>
                </div>`;
        }
    }

   function truncateText(text, maxLength = 150) {
        if (text.length <= maxLength) return text;
        return text.substring(0, maxLength) + '...';
    }

    function displayNotes(notes) {
        const container = document.getElementById('notesContainer');
        if (!notes || notes.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-sticky-note"></i>
                    <h3>No notes found</h3>
                    <p>Create your first note to get started.</p>
                    <button class="btn btn-primary" onclick="openEditor('create')" style="margin-top: 15px;">
                        <i class="fas fa-plus"></i> Add Note
                    </button>
                </div>`;
            return;
        }

        container.innerHTML = `
            <div class="notes-grid">
                ${notes.map(note => `
                    <div class="note-card">
                        <div>
                            <h3 class="note-title">${note.title}</h3>
                            <div class="note-content">${truncateText(stripHtml(note.content))}</div>
                        </div>
                        <div class="note-meta">
                            <span class="note-course">
                                <i class="fas fa-book"></i> ${note.course.title}
                            </span>
                            <span class="note-date">
                                ${new Date(note.updatedAt).toLocaleDateString()}
                            </span>
                            <div class="note-actions">
                                <button class="action-btn" onclick="editNote(${note.id})" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="action-btn btn-delete" onclick="deleteNote(${note.id}, '${note.title.replace(/'/g, "\\'")}')" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>`;
    }

    function stripHtml(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html || '';
        return tmp.textContent || tmp.innerText || '';
    }

    function filterNotes() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const courseFilter = document.getElementById('courseFilter').value;

        let filtered = allNotes;

        if (courseFilter) {
            filtered = filtered.filter(note => note.courseId.toString() === courseFilter);
        }

        if (searchTerm) {
            filtered = filtered.filter(note =>
                note.title.toLowerCase().includes(searchTerm) ||
                (note.content && note.content.toLowerCase().includes(searchTerm)) ||
                (note.course && note.course.title && note.course.title.toLowerCase().includes(searchTerm))
            );
        }

        displayNotes(filtered);
    }

    function refreshNotes() { loadNotes(currentPage); }
    function changePage(page) { if (page >= 1 && page <= totalPages) loadNotes(page); }
    function updatePagination(pagination) {
        const container = document.getElementById('paginationContainer');
        const info = document.getElementById('paginationInfo');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        if (!pagination || pagination.pages <= 1) {
            container.style.display = 'none';
            return;
        }

        container.style.display = 'flex';
        info.textContent = `Page ${pagination.page} of ${pagination.pages} (${pagination.total} notes)`;
        prevBtn.disabled = pagination.page <= 1;
        nextBtn.disabled = pagination.page >= pagination.pages;
    }

    function backToList() {
        document.getElementById('editorView').classList.remove('active');
        document.getElementById('listView').classList.remove('hidden');
        loadNotes(currentPage);
    }

    function openEditor(mode) {
        editingNoteId = null;
        document.getElementById('editorTitle').textContent = 'Create New Note';
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteCourse').value = '';
        document.getElementById('noteReferenceUrl').value = '';

        document.getElementById('listView').classList.add('hidden');
        document.getElementById('editorView').classList.add('active');

        setTimeout(() => {
            initQuill();
            if (quill) quill.setText('');
        }, 100);
    }

    function editNote(noteId) {
        const note = allNotes.find(n => n.id === noteId);
        if (!note) return;

        editingNoteId = noteId;
        document.getElementById('editorTitle').textContent = 'Edit Note';
        document.getElementById('noteTitle').value = note.title;
        document.getElementById('noteCourse').value = note.courseId;
        document.getElementById('noteReferenceUrl').value = note.referenceUrl || '';

        document.getElementById('listView').classList.add('hidden');
        document.getElementById('editorView').classList.add('active');

        setTimeout(() => {
            initQuill();
            if (quill) quill.root.innerHTML = note.content || '';
        }, 100);
    }

    async function deleteNote(noteId, noteTitle) {
        if (!confirm(`Are you sure you want to delete the note "${noteTitle}"?`)) return;
        try {
            const token = sessionStorage.getItem('token');
            const response = await fetch(`${API_BASE_URL}/tutor/notes/${noteId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                loadNotes();
            } else {
                throw new Error('Failed to delete note');
            }
        } catch (error) {
            alert('Error deleting note.');
            console.error(error);
        }
    }

    function previewNote() {
        if (!quill) return;
        const content = quill.root.innerHTML;
        document.getElementById('previewContent').innerHTML = content;
        document.getElementById('previewModal').style.display = 'block';
    }

    function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
    }

    async function saveNote() {
        if (!quill) {
            alert('Editor not initialized. Please try again.');
            return;
        }

        const courseId = parseInt(document.getElementById('noteCourse').value);
        const title = document.getElementById('noteTitle').value.trim();
        const htmlContent = quill.root.innerHTML;

        if (isNaN(courseId)) {
            alert('Please select a course.');
            document.getElementById('noteCourse').focus();
            return;
        }

        if (!title) {
            alert('Please enter a note title.');
            document.getElementById('noteTitle').focus();
            return;
        }

        if (htmlContent === '<p><br></p>' || !htmlContent.trim()) {
            alert('Please enter note content.');
            return;
        }

        const noteData = {
            courseId,
            title,
            content: htmlContent,
            referenceUrl: document.getElementById('noteReferenceUrl').value || null
        };

        const url = editingNoteId ? `${API_BASE_URL}/tutor/notes/${editingNoteId}` : `${API_BASE_URL}/tutor/notes`;
        const method = editingNoteId ? 'PUT' : 'POST';

        try {
            const token = sessionStorage.getItem('token');
            const response = await fetch(url, {
                method,
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(noteData)
            });

            if (response.ok) {
                backToList();
            } else {
                const errorData = await response.json();
                throw new Error(errorData.message || 'Failed to save note');
            }
        } catch (error) {
            alert(`Error saving note: ${error.message}`);
            console.error(error);
        }
    }

    function logout() {
        sessionStorage.removeItem('token');
        sessionStorage.removeItem('user');
        window.location.href = '/login.html';
    }

    window.onclick = function(event) {
        const preview = document.getElementById('previewModal');
        if (event.target === preview) closePreview();
    };
    </script>
<script>function logout(){localStorage.clear();sessionStorage.clear();location.replace('/login.html')}</script>
</body>
</html>
