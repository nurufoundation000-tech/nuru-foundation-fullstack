<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){var t=sessionStorage.getItem('token');if(!t){location.replace('/login.html');return}var x=new XMLHttpRequest();x.open('GET','/api/auth/verify',false);x.setRequestHeader('Authorization','Bearer '+t);try{x.send();if(x.status===401||x.status===403){sessionStorage.removeItem('token');sessionStorage.removeItem('user');location.replace('/login.html')}}catch(e){sessionStorage.removeItem('token');sessionStorage.removeItem('user');location.replace('/login.html')}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sessions - Tutor - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <base href="/">
    <style>
        .sessions-list { margin-top: 20px; }
        .session-card { background: white; border-radius: var(--border-radius-md); padding: 16px 20px; margin-bottom: 12px; box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; }
        .session-info h4 { margin: 0 0 4px 0; }
        .session-info .meta { font-size: 0.85rem; color: #666; display: flex; gap: 12px; flex-wrap: wrap; }
        .session-info .meta span { display: inline-flex; align-items: center; gap: 4px; }
        .session-actions { display: flex; gap: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: var(--border-radius-lg); padding: 30px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-content h3 { margin: 0 0 20px 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.9rem; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary-color); }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state i { font-size: 3rem; color: #ddd; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="headerContainer"></div>
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="sessions"></dashboard-sidebar>
        <div class="dashboard-main">
            <page-header title="Live Sessions" subtitle="Schedule and manage live class sessions" icon="fa-video">
                <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus"></i> New Session</button>
            </page-header>
            <div id="sessionsList"><div class="loading"><i class="fas fa-spinner fa-spin"></i></div></div>
        </div>
    </div>

    <div class="modal" id="sessionModal">
        <div class="modal-content">
            <h3 id="modalTitle">Create Session</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Course</label>
                <select id="sessionCourse"><option value="">Select course...</option></select>
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="sessionTitle" placeholder="e.g. Week 5 Live Class">
            </div>
            <div class="form-group">
                <label>Description (optional)</label>
                <textarea id="sessionDesc" rows="3" placeholder="What will this session cover?"></textarea>
            </div>
            <div class="form-group">
                <label>Meeting Link</label>
                <input type="url" id="sessionLink" placeholder="https://zoom.us/j/... or https://meet.google.com/...">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="sessionDate">
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" id="sessionTime">
                </div>
            </div>
            <div class="form-group">
                <label>Duration (minutes)</label>
                <input type="number" id="sessionDuration" value="60" min="15" max="480">
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSession()">Save Session</button>
            </div>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script>
        let courses = [];
        let sessions = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            if (!DashboardUtils.checkAuth('tutor')) return;
            await Promise.all([loadCourses(), loadSessions()]);
        });

        async function loadCourses() {
            try {
                const data = await DashboardUtils.fetchAPI('/tutor/courses');
                courses = data.data || [];
                const select = document.getElementById('sessionCourse');
                select.innerHTML = '<option value="">Select course...</option>' + courses.map(c => `<option value="${c.id}">${escapeHtml(c.title)}</option>`).join('');
            } catch (e) { console.error('Load courses error:', e); }
        }

        async function loadSessions() {
            try {
                const data = await DashboardUtils.fetchAPI('/tutor/sessions');
                sessions = data.data || [];
                renderSessions();
            } catch (e) {
                console.error('Load sessions error:', e);
                document.getElementById('sessionsList').innerHTML = '<div class="error-message">Failed to load sessions</div>';
            }
        }

        function renderSessions() {
            const container = document.getElementById('sessionsList');
            if (sessions.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-video"></i><h3>No sessions scheduled</h3><p>Create your first live session for your students</p></div>';
                return;
            }

            container.innerHTML = sessions.map(s => {
                const dateStr = new Date(s.session_date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                const now = new Date();
                const sessionDate = new Date(s.session_date + 'T' + s.session_time);
                const isPast = sessionDate < now;
                return `
                    <div class="session-card">
                        <div class="session-info">
                            <h4>${escapeHtml(s.title)}</h4>
                            <div style="font-size:0.8rem;color:#888;">${escapeHtml(s.course_title || '')}</div>
                            <div class="meta">
                                <span><i class="fas fa-calendar"></i> ${dateStr}</span>
                                <span><i class="fas fa-clock"></i> ${s.session_time.slice(0, 5)}</span>
                                <span><i class="fas fa-hourglass-half"></i> ${s.duration_minutes} min</span>
                                <span class="${isPast ? 'status-pending' : 'status-submitted'}" style="padding:2px 8px;border-radius:4px;font-size:0.75rem;">${isPast ? 'Ended' : 'Upcoming'}</span>
                            </div>
                        </div>
                        <div class="session-actions">
                            <button class="btn btn-sm btn-outline" onclick="editSession(${s.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-outline" style="color:#e74c3c;border-color:#e74c3c;" onclick="deleteSession(${s.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Create Session';
            document.getElementById('editId').value = '';
            document.getElementById('sessionTitle').value = '';
            document.getElementById('sessionDesc').value = '';
            document.getElementById('sessionLink').value = '';
            document.getElementById('sessionDate').value = '';
            document.getElementById('sessionTime').value = '';
            document.getElementById('sessionDuration').value = '60';
            document.getElementById('sessionCourse').value = '';
            document.getElementById('sessionModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('sessionModal').classList.remove('show');
        }

        async function saveSession() {
            const id = document.getElementById('editId').value;
            const body = {
                courseId: parseInt(document.getElementById('sessionCourse').value),
                title: document.getElementById('sessionTitle').value,
                description: document.getElementById('sessionDesc').value || null,
                meetingLink: document.getElementById('sessionLink').value,
                sessionDate: document.getElementById('sessionDate').value,
                sessionTime: document.getElementById('sessionTime').value,
                durationMinutes: parseInt(document.getElementById('sessionDuration').value)
            };

            if (!body.courseId || !body.title || !body.meetingLink || !body.sessionDate || !body.sessionTime) {
                alert('Please fill in all required fields');
                return;
            }

            try {
                if (id) {
                    await DashboardUtils.fetchAPI(`/sessions/${id}`, { method: 'PUT', body: JSON.stringify(body) });
                } else {
                    await DashboardUtils.fetchAPI('/sessions', { method: 'POST', body: JSON.stringify(body) });
                }
                closeModal();
                await loadSessions();
            } catch (e) {
                alert('Failed to save session: ' + e.message);
            }
        }

        async function editSession(id) {
            const session = sessions.find(s => s.id === id);
            if (!session) return;
            document.getElementById('modalTitle').textContent = 'Edit Session';
            document.getElementById('editId').value = id;
            document.getElementById('sessionCourse').value = session.course_id;
            document.getElementById('sessionTitle').value = session.title;
            document.getElementById('sessionDesc').value = session.description || '';
            document.getElementById('sessionLink').value = session.meeting_link;
            document.getElementById('sessionDate').value = session.session_date;
            document.getElementById('sessionTime').value = session.session_time;
            document.getElementById('sessionDuration').value = session.duration_minutes;
            document.getElementById('sessionModal').classList.add('show');
        }

        async function deleteSession(id) {
            if (!confirm('Are you sure you want to delete this session?')) return;
            try {
                await DashboardUtils.fetchAPI(`/sessions/${id}`, { method: 'DELETE' });
                await loadSessions();
            } catch (e) {
                alert('Failed to delete session');
            }
        }
    </script>
<script>function logout(){localStorage.clear();sessionStorage.clear();location.replace('/login.html')}</script>
</body>
</html>
