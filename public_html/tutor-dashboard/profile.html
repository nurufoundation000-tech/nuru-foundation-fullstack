<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <base href="/">
    <style>
        .profile-header { display: flex; align-items: center; gap: 30px; background: linear-gradient(135deg, var(--primary-color), var(--accent-color-1)); color: white; padding: 40px; border-radius: var(--border-radius-lg); margin-bottom: 30px; }
        .profile-avatar { width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; color: var(--primary-color); flex-shrink: 0; }
        .profile-info h1 { margin: 0 0 10px 0; font-size: 2rem; }
        .profile-info p { margin: 0; opacity: 0.9; }
        
        .profile-section { background: white; border-radius: var(--border-radius-lg); padding: 25px; margin-bottom: 25px; box-shadow: var(--shadow-md); }
        .profile-section h2 { color: var(--primary-color); margin: 0 0 20px 0; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .info-item { padding: 15px; background: #f8f9fa; border-radius: var(--border-radius-md); }
        .info-item .label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .info-item .value { font-weight: 600; color: #333; }
        
        .alert-box { padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .alert-box.warning { background: #fff3cd; border: 1px solid #ffc107; color: #856404; }
        .alert-box.success { background: #d4edda; border: 1px solid #28a745; color: #155724; }
        .alert-box.error { background: #f8d7da; border: 1px solid #dc3545; color: #721c24; }
        .alert-box.info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: var(--primary-color); }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .btn { padding: 12px 24px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: var(--secondary-color); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-sm { padding: 8px 16px; font-size: 14px; }
        
        .edit-form { display: none; }
        .edit-form.active { display: block; }
        .view-mode { display: block; }
        .view-mode.hidden { display: none; }
        
        .password-section { margin-top: 30px; }
        .password-section h2 { border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; }
        
        .loading { text-align: center; padding: 40px; color: #666; }
        .loading i { font-size: 2rem; margin-bottom: 10px; }
        
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="headerContainer"></div>
    
    <div class="dashboard-container" style="padding-top: 80px;">
        <tutor-sidebar active="profile"></tutor-sidebar>
        
        <div class="dashboard-main">
            <!-- First Login Alert -->
            <div id="firstLoginAlert" class="alert-box info" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <div>
                    <strong>Welcome! This is your first login.</strong>
                    <p style="margin: 5px 0 0 0;">Please set your password to continue.</p>
                </div>
            </div>
            
            <div class="profile-header">
                <div class="profile-avatar" id="userAvatar">JD</div>
                <div class="profile-info">
                    <h1 id="userFullName">Loading...</h1>
                    <p id="userEmail">Loading...</p>
                </div>
            </div>
            
            <!-- Profile Edit Section -->
            <div class="profile-section">
                <h2><i class="fas fa-user"></i> Personal Information</h2>
                
                <div id="profileAlert"></div>
                
                <!-- View Mode -->
                <div id="viewMode" class="view-mode">
                    <div class="info-grid" id="profileInfo">
                        <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                    </div>
                    <button class="btn btn-sm" style="margin-top: 20px;" onclick="showEditForm()">
                        <i class="fas fa-edit"></i> Edit Profile
                    </button>
                </div>
                
                <!-- Edit Form -->
                <div id="editForm" class="edit-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editFullName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="editUsername" placeholder="Enter username">
                    </div>
                    <div class="form-row">
                        <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
                        <button class="btn" onclick="saveProfile()">Save Changes</button>
                    </div>
                </div>
            </div>
            
            <!-- Password Change Section -->
            <div class="profile-section password-section">
                <h2><i class="fas fa-lock"></i> Change Password</h2>
                
                <div id="passwordAlert"></div>
                
                <!-- First Login Password Form (no current password) -->
                <div id="firstLoginPasswordForm" style="display: none;">
                    <div class="alert-box warning">
                        <i class="fas fa-key"></i>
                        <div>
                            <strong>Set Your Password</strong>
                            <p style="margin: 5px 0 0 0;">Create a secure password to protect your account.</p>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPasswordFirstLogin" placeholder="Enter new password (min 8 characters)">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPasswordFirstLogin" placeholder="Confirm your password">
                    </div>
                    <button class="btn" onclick="setPasswordFirstLogin()">Set Password</button>
                </div>
                
                <!-- Regular Password Change Form -->
                <div id="regularPasswordForm">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter current password">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="newPassword" placeholder="Enter new password (min 8 characters)">
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirmNewPassword" placeholder="Confirm new password">
                        </div>
                    </div>
                    <button class="btn" onclick="changePassword()">Update Password</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footerContainer"></div>

    <script src="/scripts/config.js"></script>
    <script>
        let currentUser = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            loadHeader();
            loadFooter();
            loadProfileData();
        });
        
        function loadHeader() {
            const container = document.getElementById('headerContainer');
            container.innerHTML = `
                <header class="main-header">
                    <div class="header-content">
                        <a href="/" class="logo">
                            <span class="logo-text">NURU</span>
                            <span class="logo-sub">FOUNDATION</span>
                        </a>
                        <nav class="main-nav">
                            <a href="/" class="nav-link">Home</a>
                            <a href="/courses.html" class="nav-link">Courses</a>
                            <a href="/about.html" class="nav-link">About</a>
                            <a href="/contact.html" class="nav-link">Contact</a>
                        </nav>
                        <div class="header-auth">
                            <a href="/login.html" class="btn-logout" onclick="logout()">Logout</a>
                        </div>
                    </div>
                </header>
            `;
        }
        
        function loadFooter() {
            const container = document.getElementById('footerContainer');
            container.innerHTML = `
                <footer class="main-footer">
                    <p>&copy; 2024 Nuru Foundation. All rights reserved.</p>
                </footer>
            `;
        }
        
        function checkAuth() {
            const token = sessionStorage.getItem('token') || localStorage.getItem('token');
            const userData = sessionStorage.getItem('user') || localStorage.getItem('user');
            
            if (!token || !userData) {
                window.location.href = '/login.html';
                return null;
            }
            
            const user = JSON.parse(userData);
            const userRole = user.role?.name || user.role;
            
            if (userRole !== 'tutor' && userRole !== 'teacher') {
                window.location.href = '/login.html';
                return null;
            }
            
            return user;
        }
        
        function getInitials(name) {
            return name ? name.split(' ').map(w => w.charAt(0)).join('').toUpperCase().substring(0, 2) : 'JD';
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            sessionStorage.removeItem('token');
            sessionStorage.removeItem('user');
            window.location.href = '/login.html';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function loadProfileData() {
            const userData = sessionStorage.getItem('user') || localStorage.getItem('user');
            if (!userData) {
                window.location.href = '/login.html';
                return;
            }
            
            currentUser = JSON.parse(userData);
            
            document.getElementById('userFullName').textContent = currentUser.fullName || currentUser.username || 'Tutor';
            document.getElementById('userEmail').textContent = currentUser.email || '';
            document.getElementById('userAvatar').textContent = getInitials(currentUser.fullName || currentUser.username);
            
            // Check for first login (mustChangePassword)
            if (currentUser.mustChangePassword) {
                document.getElementById('firstLoginAlert').style.display = 'flex';
                document.getElementById('firstLoginPasswordForm').style.display = 'block';
                document.getElementById('regularPasswordForm').style.display = 'none';
            }
            
            loadUserDetails();
        }
        
        async function loadUserDetails() {
            const container = document.getElementById('profileInfo');
            
            try {
                const token = sessionStorage.getItem('token') || localStorage.getItem('token');
                const response = await fetch('/api/users/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success && data.user) {
                    displayProfileInfo(data.user);
                } else {
                    displayProfileInfo(currentUser);
                }
            } catch (error) {
                console.error('Error:', error);
                displayProfileInfo(currentUser);
            }
        }
        
        function displayProfileInfo(user) {
            const container = document.getElementById('profileInfo');
            
            container.innerHTML = `
                <div class="info-item">
                    <div class="label">Full Name</div>
                    <div class="value">${escapeHtml(user.fullName || user.username || 'N/A')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Email</div>
                    <div class="value">${escapeHtml(user.email || 'N/A')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Username</div>
                    <div class="value">${escapeHtml(user.username || 'N/A')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Role</div>
                    <div class="value">${escapeHtml(user.role?.name || user.role || 'Tutor')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Phone</div>
                    <div class="value">${escapeHtml(user.phone || 'Not provided')}</div>
                </div>
                <div class="info-item">
                    <div class="label">Location</div>
                    <div class="value">${escapeHtml(user.location || 'Not provided')}</div>
                </div>
            `;
        }
        
        function showEditForm() {
            document.getElementById('viewMode').classList.add('hidden');
            document.getElementById('editForm').classList.add('active');
            
            document.getElementById('editFullName').value = currentUser.fullName || '';
            document.getElementById('editUsername').value = currentUser.username || '';
        }
        
        function cancelEdit() {
            document.getElementById('viewMode').classList.remove('hidden');
            document.getElementById('editForm').classList.remove('active');
        }
        
        async function saveProfile() {
            const fullName = document.getElementById('editFullName').value.trim();
            const username = document.getElementById('editUsername').value.trim();
            const alertBox = document.getElementById('profileAlert');
            
            if (!fullName && !username) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> Please enter at least one field to update.</div>';
                return;
            }
            
            try {
                const token = sessionStorage.getItem('token') || localStorage.getItem('token');
                const response = await fetch('/api/users/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ fullName, username })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentUser = { ...currentUser, fullName: fullName || currentUser.fullName, username: username || currentUser.username };
                    sessionStorage.setItem('user', JSON.stringify(currentUser));
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    
                    document.getElementById('userFullName').textContent = currentUser.fullName || currentUser.username;
                    document.getElementById('userAvatar').textContent = getInitials(currentUser.fullName || currentUser.username);
                    
                    alertBox.innerHTML = '<div class="alert-box success"><i class="fas fa-check-circle"></i> Profile updated successfully!</div>';
                    cancelEdit();
                    loadUserDetails();
                } else {
                    alertBox.innerHTML = `<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> ${data.error || 'Failed to update profile'}</div>`;
                }
            } catch (error) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> An error occurred. Please try again.</div>';
            }
        }
        
        async function setPasswordFirstLogin() {
            const newPassword = document.getElementById('newPasswordFirstLogin').value;
            const confirmPassword = document.getElementById('confirmPasswordFirstLogin').value;
            const alertBox = document.getElementById('passwordAlert');
            
            if (!newPassword || !confirmPassword) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> Please fill in both password fields.</div>';
                return;
            }
            
            if (newPassword.length < 8) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> Password must be at least 8 characters long.</div>';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> Passwords do not match.</div>';
                return;
            }
            
            try {
                const token = sessionStorage.getItem('token') || localStorage.getItem('token');
                const response = await fetch('/api/users/set-password', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ newPassword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentUser.mustChangePassword = false;
                    sessionStorage.setItem('user', JSON.stringify(currentUser));
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    
                    document.getElementById('firstLoginAlert').style.display = 'none';
                    document.getElementById('firstLoginPasswordForm').style.display = 'none';
                    document.getElementById('regularPasswordForm').style.display = 'block';
                    
                    alertBox.innerHTML = '<div class="alert-box success"><i class="fas fa-check-circle"></i> Password set successfully! You can now access all features.</div>';
                } else {
                    alertBox.innerHTML = `<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> ${data.error || 'Failed to set password'}</div>`;
                }
            } catch (error) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> An error occurred. Please try again.</div>';
            }
        }
        
        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;
            const alertBox = document.getElementById('passwordAlert');
            
            if (!currentPassword || !newPassword || !confirmNewPassword) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> Please fill in all password fields.</div>';
                return;
            }
            
            if (newPassword.length < 8) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> New password must be at least 8 characters long.</div>';
                return;
            }
            
            if (newPassword !== confirmNewPassword) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> New passwords do not match.</div>';
                return;
            }
            
            try {
                const token = sessionStorage.getItem('token') || localStorage.getItem('token');
                const response = await fetch('/api/users/change-password', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alertBox.innerHTML = '<div class="alert-box success"><i class="fas fa-check-circle"></i> Password changed successfully!</div>';
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmNewPassword').value = '';
                } else {
                    alertBox.innerHTML = `<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> ${data.error || 'Failed to change password'}</div>`;
                }
            } catch (error) {
                alertBox.innerHTML = '<div class="alert-box error"><i class="fas fa-exclamation-circle"></i> An error occurred. Please try again.</div>';
            }
        }
    </script>
</body>
</html>
