<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Dashboard - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
</head>
<body>
    <div id="headerContainer"></div>
    
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="tutor-dashboard"></dashboard-sidebar>
        
        <div class="dashboard-main">
            <page-header title="Tutor Dashboard" subtitle="Manage your courses and students" icon="fa-chalkboard-teacher"></page-header>
            
            <stats-grid id="tutorStats" stats='[]'></stats-grid>
            
            <div class="content-grid" id="coursesGrid">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </div>
    </div>

    <div id="footerContainer"></div>

    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            
            if (!DashboardUtils.checkAuth('tutor')) return;
            
            loadTutorData();
        });
        
        async function loadTutorData() {
            try {
                const data = await DashboardUtils.fetchAPI('/tutor/courses');
                
                if (!data.success) throw new Error(data.error);
                
                const courses = data.data || [];
                updateStats(courses);
                displayCourses(courses);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('coursesGrid').innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${error.message}</div>`;
            }
        }
        
        function updateStats(courses) {
            const totalCourses = courses.length;
            const totalStudents = courses.reduce((sum, c) => sum + (c._count?.enrollments || 0), 0);
            const totalLessons = courses.reduce((sum, c) => sum + (c._count?.lessons || 0), 0);
            
            document.getElementById('tutorStats').setAttribute('stats', JSON.stringify([
                { value: totalCourses, label: 'My Courses' },
                { value: totalStudents, label: 'Students' },
                { value: totalLessons, label: 'Lessons' },
                { value: '0', label: 'Pending' }
            ]));
        }
        
        function displayCourses(courses) {
            const container = document.getElementById('coursesGrid');
            
            if (!courses.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-book"></i><h3>No courses yet</h3><p>Create your first course to get started</p><a href="/tutor-dashboard/courses.html" class="btn btn-primary">Create Course</a></div>';
                return;
            }
            
            container.innerHTML = courses.map(course => `
                <div class="tutor-course-card">
                    <div class="tutor-course-header">
                        <h3>${escapeHtml(course.title)}</h3>
                        <div>
                            <a href="/tutor-dashboard/lessons.html?courseId=${course.id}" class="btn btn-sm btn-outline" style="color:white;border-color:white">Manage</a>
                        </div>
                    </div>
                    <div class="tutor-course-body">
                        <p>${escapeHtml(course.description || 'No description')}</p>
                        <div class="tutor-course-stats">
                            <div class="stat"><div class="stat-value">${course._count?.lessons || 0}</div><div class="stat-label">Lessons</div></div>
                            <div class="stat"><div class="stat-value">${course._count?.enrollments || 0}</div><div class="stat-label">Students</div></div>
                            <div class="stat"><div class="stat-value">${course.isPublished ? 'Yes' : 'No'}</div><div class="stat-label">Published</div></div>
                        </div>
                        <a href="/tutor-dashboard/courses.html" class="btn btn-primary btn-sm">Edit Course</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
