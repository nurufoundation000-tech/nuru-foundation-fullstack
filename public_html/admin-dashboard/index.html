<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NURU FOUNDATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/root.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="styles.css">
    <base href="/">
</head>
<body>
    <div id="headerContainer"></div>
    
    <div class="dashboard-container" style="padding-top: 80px;">
        <dashboard-sidebar active="admin-dashboard"></dashboard-sidebar>
        
        <div class="dashboard-main">
            <page-header title="Admin Dashboard" subtitle="System overview and management" icon="fa-cogs"></page-header>
            
            <stats-grid id="adminStats" stats='[]'></stats-grid>
            
            <div class="content-grid" id="adminContent">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </div>
    </div>

    <div id="footerContainer"></div>

    <script src="/scripts/config.js"></script>
    <script src="/scripts/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await DashboardUtils.loadHeader();
            await DashboardUtils.loadFooter();
            
            if (!DashboardUtils.checkAuth('admin')) return;
            
            loadAdminData();
        });
        
        async function loadAdminData() {
            try {
                const [coursesRes, usersRes, enrollmentsRes] = await Promise.all([
                    DashboardUtils.fetchAPI('/admin/courses'),
                    DashboardUtils.fetchAPI('/admin/users'),
                    DashboardUtils.fetchAPI('/admin/enrollments')
                ]);
                
                const courses = coursesRes.data || [];
                const users = usersRes.data || [];
                const enrollments = enrollmentsRes.data || [];
                
                updateStats({ courses, users, enrollments });
                displayQuickLinks();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('adminContent').innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${error.message}</div>`;
            }
        }
        
        function updateStats({ courses, users, enrollments }) {
            document.getElementById('adminStats').setAttribute('stats', JSON.stringify([
                { value: users.length, label: 'Users' },
                { value: courses.length, label: 'Courses' },
                { value: enrollments.length, label: 'Enrollments' },
                { value: '0', label: 'Pending' }
            ]));
        }
        
        function displayQuickLinks() {
            const container = document.getElementById('adminContent');
            
            container.innerHTML = `
                <a href="/admin-dashboard/users.html" class="content-card" style="text-decoration:none">
                    <div class="card-header"><h3><i class="fas fa-users"></i> Users</h3></div>
                    <div class="card-body"><p class="card-description">Manage all users, roles, and permissions</p></div>
                </a>
                <a href="/admin-dashboard/courses.html" class="content-card" style="text-decoration:none">
                    <div class="card-header"><h3><i class="fas fa-book"></i> Courses</h3></div>
                    <div class="card-body"><p class="card-description">View and manage all courses in the system</p></div>
                </a>
                <a href="/admin-dashboard/enrollments.html" class="content-card" style="text-decoration:none">
                    <div class="card-header"><h3><i class="fas fa-clipboard-list"></i> Enrollments</h3></div>
                    <div class="card-body"><p class="card-description">Track all course enrollments and progress</p></div>
                </a>
                <a href="/admin-dashboard/analytics.html" class="content-card" style="text-decoration:none">
                    <div class="card-header"><h3><i class="fas fa-chart-bar"></i> Analytics</h3></div>
                    <div class="card-body"><p class="card-description">View detailed analytics and reports</p></div>
                </a>
            `;
        }
    </script>
</body>
</html>
